secretsNames:
  # EHR auth token — stored encrypted in the Vault DON.
  # In the CRE workflow, inject via: Authorization: Bearer {{.ehrAuthToken}}
  # The token is injected INSIDE the TEE at request time. Never in code or logs.
  #
  # For the demo (public HAPI FHIR sandbox — no auth required):
  #   Set EHR_AUTH_TOKEN_ALL to any placeholder value.
  #   In production, set it to your real EHR OAuth2 bearer token.
  ehrAuthToken:
    - EHR_AUTH_TOKEN_ALL
